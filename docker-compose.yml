services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codex_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - codex_postgres_data:/var/lib/postgresql/data
      - ./backend/infra:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codex_demo"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  codex_postgres_data:
