databases:
  - name: liquiguard-postgres
    plan: free
    postgresMajorVersion: "16"
    databaseName: liquiguard
    user: liquiguard_owner
    ipAllowList: []

services:
  - type: web
    name: liquiguard-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: ./scripts/start.sh
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: liquiguard-postgres
          property: connectionString
      - key: MIGRATION_DATABASE_URL
        fromDatabase:
          name: liquiguard-postgres
          property: connectionString
      - key: DB_APP_USER
        value: app_shared
      - key: DB_APP_PASSWORD
        generateValue: true
      - key: DB_BKASH_USER
        value: app_bkash
      - key: DB_BKASH_PASSWORD
        generateValue: true
      - key: DB_NAGAD_USER
        value: app_nagad
      - key: DB_NAGAD_PASSWORD
        generateValue: true
      - key: DB_ROCKET_USER
        value: app_rocket
      - key: DB_ROCKET_PASSWORD
        generateValue: true
      - key: DEMO_AGENT_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: ANOMALY_ALLOWLISTED_PROVIDERS
        value: ""
      - key: HISTORICAL_WINDOW_DAYS
        value: "30"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
